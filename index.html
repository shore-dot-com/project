<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="#" class="logo">WAGORA</a>
        <input type="checkbox" name="" id="nav-toggle" />
        <label for="nav-toggle" class="burger">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </label>
        <div class="nav-menu">
          <ul class="nav-list">
            <li class="nav"><a href="" class="nav-link">About</a></li>
            <li class="nav"><a href="" class="nav-link">Shop</a></li>
            <li class="nav"><a href="" class="nav-link">Contact</a></li>
          </ul>
          <button class="start-btn">Log in</button>
        </div>
      </div>
    </nav>

    <section class="hero">
      <div class="shopNow">
        <h1>Happy Tails Start Here</h1>
        <p>Curated essentials for every wag, purr and hop</p>
        <button class="btn">Shop Now</button>
      </div>
    </section>

    <section class="second">
      <h2 class="section-title">Happy Tails Start Here</h2>
      <div class="pet">
        <div class="pet-card dog-card">
          <div class="pet-img-wrap">
            <img src="./images/dogs.png" alt="Dog" />
          </div>
          <p>Dogs</p>
        </div>
        <div class="pet-card cat-card">
          <div class="pet-img-wrap">
            <img src="./images/cats.png" alt="Cat" />
          </div>
          <p>Cats</p>
        </div>
        <div class="pet-card small-card">
          <div class="pet-img-wrap">
            <img src="./images/smallPets.png" alt="Small Pets" />
          </div>
          <p>Small pets</p>
        </div>
        <div class="pet-card bird-card">
          <div class="pet-img-wrap">
            <img src="./images/birds.png" alt="Birds" />
          </div>
          <p>birds</p>
        </div>
      </div>
    </section>
    
</div>
  </body>
</html>
